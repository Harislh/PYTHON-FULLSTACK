<!doctype html>
<html lang="en">
  <head>
    <title>List's</title>
  </head>
  <body>
    <h2>Ordered List:</h2>
    <ol>
      <li>one</li>
      <li>two</li>
      <li>three</li>
      <li>four</li>
    </ol>
    <h2>UnOrdered List:</h2>
    <ul>
      <li>Apple</li>
      <li>Harish</li>
      <li>Car</li>
    </ul>
  </body>
</html>
